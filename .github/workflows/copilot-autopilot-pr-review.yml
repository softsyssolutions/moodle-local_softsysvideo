name: Copilot Autopilot PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  request-copilot-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot as PR reviewer
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: ['copilot'],
              });
              core.info('Copilot reviewer requested successfully.');
            } catch (error) {
              // 422 can happen if already requested, unsupported plan, or feature not enabled.
              const status = error.status || error.response?.status;
              const message = error.message || 'unknown error';

              if (status === 422) {
                core.warning(`Copilot reviewer request returned 422: ${message}`);
                core.warning('Check Copilot code review availability and repository/org settings.');
              } else {
                throw error;
              }
            }
